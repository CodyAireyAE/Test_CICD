name: Promote to Prod

# Manual trigger — you pick the version to promote from test to prod
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify test tag exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Checking for test/v$VERSION tag..."
          if ! git tag --list | grep -q "^test/v${VERSION}$"; then
            echo "============================================="
            echo " BLOCKED: test/v$VERSION tag does not exist!"
            echo " You must promote to test first."
            echo "============================================="
            exit 1
          fi
          echo "test/v$VERSION exists ✓ — promotion allowed"

      - name: Verify dev tag exists (full chain)
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! git tag --list | grep -q "^dev/v${VERSION}$"; then
            echo "WARNING: dev/v$VERSION not found — tag chain incomplete"
          else
            echo "dev/v$VERSION exists ✓ — full chain verified"
          fi

  deploy-prod:
    needs: gate-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "test/v${{ github.event.inputs.version }}"

      - name: Deploy to production
        run: |
          echo "==========================================="
          echo " DEPLOYING TO PRODUCTION"
          echo " Version: v${{ github.event.inputs.version }}"
          echo "==========================================="
          cat app.txt
          echo ""
          echo "Production deployment complete ✓"

      # -------------------------------------------------------
      # AZURE PLACEHOLDER — deploy to prod environment
      # -------------------------------------------------------
      # - name: Login to Azure
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Azure Prod
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: ${{ vars.AZURE_APP_NAME }}
      #     slot-name: production
      #     package: .
      #
      # - name: Smoke test
      #   run: |
      #     curl -f https://${{ vars.AZURE_APP_NAME }}.azurewebsites.net/health || exit 1

      - name: Stamp prod tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="prod/v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG ✓"

      - name: Create final GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prod/v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          prerelease: false
          body: |
            ## Production Release v${{ github.event.inputs.version }}
            Promoted through: `dev` → `test` → `prod`

            **Status:** ✅ Live in production.
