name: Promote to Prod

# Manual trigger — you pick the version to promote from test to prod
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must be semver (e.g. 1.2.0), got: $VERSION"
            exit 1
          fi
          echo "Version format valid ✓"

      - name: Check not already promoted to prod
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if git tag --list | grep -q "^prod/v${VERSION}$"; then
            echo "ERROR: prod/v$VERSION already exists — this version is already in production."
            exit 1
          fi
          echo "Not yet in prod ✓"

      - name: Verify full promotion chain
        run: |
          VERSION="${{ github.event.inputs.version }}"
          FAILED=0

          echo "Verifying promotion chain for v$VERSION..."
          echo ""

          # Check dev tag
          if git tag --list | grep -q "^dev/v${VERSION}$"; then
            echo "  ✓ dev/v$VERSION"
          else
            echo "  ✗ dev/v$VERSION — MISSING"
            FAILED=1
          fi

          # Check test tag
          if git tag --list | grep -q "^test/v${VERSION}$"; then
            echo "  ✓ test/v$VERSION"
          else
            echo "  ✗ test/v$VERSION — MISSING"
            FAILED=1
          fi

          echo ""

          if [ $FAILED -eq 1 ]; then
            echo "============================================="
            echo " BLOCKED: Incomplete promotion chain!"
            echo " A version must go dev → test → prod."
            echo "============================================="
            echo ""
            echo "Versions available for prod promotion (have both dev + test tags):"
            for tag in $(git tag --list 'test/v*' | sed 's|test/v||'); do
              if git tag --list | grep -q "^dev/v${tag}$"; then
                if ! git tag --list | grep -q "^prod/v${tag}$"; then
                  echo "  $tag"
                fi
              fi
            done
            exit 1
          fi

          echo "Full chain verified ✓ — promotion allowed"

  deploy-prod:
    needs: gate-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "test/v${{ github.event.inputs.version }}"

      - name: Deploy to production
        run: |
          echo "==========================================="
          echo " DEPLOYING TO PRODUCTION"
          echo " Version: v${{ github.event.inputs.version }}"
          echo "==========================================="
          cat app.txt
          echo ""
          echo "Production deployment complete ✓"

      # -------------------------------------------------------
      # AZURE PLACEHOLDER — deploy to prod environment
      # -------------------------------------------------------
      # - name: Login to Azure
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Azure Prod
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: ${{ vars.AZURE_APP_NAME }}
      #     slot-name: production
      #     package: .
      #
      # - name: Smoke test
      #   run: |
      #     curl -f https://${{ vars.AZURE_APP_NAME }}.azurewebsites.net/health || exit 1

      - name: Stamp prod tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="prod/v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG ✓"

      - name: Create final GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "prod/v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          prerelease: false
          body: |
            ## Production Release v${{ github.event.inputs.version }}
            Promoted through: `dev` → `test` → `prod`

            **Status:** ✅ Live in production.
