name: Create Release

# Manually trigger to cut a new version
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must be semver (e.g. 1.2.0), got: $VERSION"
            exit 1
          fi
          echo "Version $VERSION is valid ✓"

      - name: Stamp version into app.txt
        run: |
          sed -i "s/^Version: .*/Version: ${{ github.event.inputs.version }}/" app.txt
          cat app.txt

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.txt
          git commit -m "release: bump version to v${{ github.event.inputs.version }}"
          git push

      - name: Create Git tag
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          body: |
            ## Release v${{ github.event.inputs.version }}
            Created from commit ${{ github.sha }} on branch ${{ github.ref_name }}.
          generate_release_notes: true
          files: app.txt
