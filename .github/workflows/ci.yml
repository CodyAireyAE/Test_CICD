name: CI Build

# Runs on every push/PR to main — just validates and tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate app.txt exists
        run: |
          echo "=== CI Build ==="
          if [ ! -f app.txt ]; then
            echo "ERROR: app.txt not found!"
            exit 1
          fi
          echo "app.txt found ✓"
          cat app.txt

      - name: Run quick checks
        run: |
          echo "Running lint/checks..."
          echo "All checks passed ✓"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-artifact
          path: app.txt
