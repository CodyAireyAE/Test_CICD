name: Enforce Prod Tag Policy

# Fires when any prod/ tag is pushed — deletes it if test/ tag doesn't exist
on:
  push:
    tags:
      - "prod/*"

permissions:
  contents: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify full promotion chain exists
        run: |
          PROD_TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${PROD_TAG#prod/}"
          echo "Prod tag pushed: $PROD_TAG"
          FAILED=0

          echo "Checking dev/$VERSION..."
          if ! git tag --list | grep -q "^dev/${VERSION}$"; then
            echo "  ✗ dev/$VERSION — MISSING"
            FAILED=1
          else
            echo "  ✓ dev/$VERSION"
          fi

          echo "Checking test/$VERSION..."
          if ! git tag --list | grep -q "^test/${VERSION}$"; then
            echo "  ✗ test/$VERSION — MISSING"
            FAILED=1
          else
            echo "  ✓ test/$VERSION"
          fi

          if [ $FAILED -eq 1 ]; then
            echo "============================================="
            echo " VIOLATION: Incomplete promotion chain!"
            echo " Removing unauthorized prod tag: $PROD_TAG"
            echo "============================================="
            git push origin --delete "$PROD_TAG"
            echo "Tag $PROD_TAG deleted ✓"
            exit 1
          fi

          echo "Full chain verified ✓ — prod tag is valid"
